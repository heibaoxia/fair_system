<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - Fair-System</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .auth-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .auth-card {
            width: min(500px, 100%);
            background: var(--bg-surface);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            padding: 28px;
        }

        .auth-title {
            margin-bottom: 8px;
            font-size: 1.75rem;
        }

        .auth-subtitle,
        .auth-note,
        .auth-hint {
            color: var(--text-muted);
        }

        .auth-subtitle {
            margin-bottom: 16px;
        }

        .auth-banner {
            border-radius: var(--radius-sm);
            border: 1px solid rgba(59, 130, 246, 0.2);
            background: rgba(59, 130, 246, 0.08);
            color: #1d4ed8;
            font-size: 0.92rem;
            margin-bottom: 18px;
            padding: 12px 14px;
        }

        .auth-banner strong {
            display: block;
            margin-bottom: 4px;
        }

        .auth-form {
            display: grid;
            gap: 12px;
        }

        .auth-note {
            font-size: 0.82rem;
            margin-top: -4px;
        }

        .auth-error {
            display: none;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(239, 68, 68, 0.25);
            background: rgba(239, 68, 68, 0.08);
            color: #b91c1c;
            font-size: 0.9rem;
            padding: 10px 12px;
        }

        .auth-error.show {
            display: block;
        }

        .auth-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 8px;
            gap: 8px;
            flex-wrap: wrap;
        }

        .auth-hint a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .auth-hint a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <main class="auth-shell">
        <section class="auth-card" aria-labelledby="register-title">
            <h1 id="register-title" class="auth-title">注册账号</h1>
            <p class="auth-subtitle">公开注册会自动创建你的账号，完成邮箱验证后即可登录。</p>

            <div class="auth-banner" role="note">
                <strong>邮箱验证</strong>
                <div>填写邮箱、用户名和性别后，系统会自动创建你的账号，并向你的邮箱发送验证邮件。</div>
            </div>

            <form id="register-form" class="auth-form" autocomplete="on">
                <label>
                    邮箱
                    <input
                        id="register-email"
                        class="input-field"
                        type="email"
                        name="email"
                        autocomplete="email"
                        required
                        autofocus
                    >
                </label>
                <label>
                    用户名
                    <input
                        id="register-username"
                        class="input-field"
                        type="text"
                        name="username"
                        autocomplete="nickname"
                        required
                    >
                </label>
                <label>
                    性别
                    <select id="register-gender" class="input-field" name="gender" required>
                        <option value="private" selected>保密</option>
                        <option value="male">男</option>
                        <option value="female">女</option>
                    </select>
                </label>
                <p class="auth-note">你的邮箱和手机号默认不公开，可在后续资料页自行设置。</p>
                <label>
                    密码
                    <input id="register-password" class="input-field" type="password" name="password" minlength="6" required>
                </label>
                <label>
                    确认密码
                    <input
                        id="register-password-confirm"
                        class="input-field"
                        type="password"
                        name="password_confirm"
                        minlength="6"
                        required
                    >
                </label>

                <div id="register-error" class="auth-error" role="alert"></div>

                <div class="auth-actions">
                    <button id="register-submit" type="submit" class="btn btn-primary">立即注册</button>
                    <span class="auth-hint">
                        已有账号？<a id="to-login-link" href="/login">去登录</a>
                    </span>
                </div>
            </form>
        </section>
    </main>

    <script>
        const nextUrl = "{{ next_url|e }}";
        const registerForm = document.getElementById('register-form');
        const submitButton = document.getElementById('register-submit');
        const errorBox = document.getElementById('register-error');
        const toLoginLink = document.getElementById('to-login-link');
        const emailInput = document.getElementById('register-email');
        const usernameInput = document.getElementById('register-username');
        const genderInput = document.getElementById('register-gender');

        toLoginLink.href = `/login?next=${encodeURIComponent(nextUrl)}`;

        function showError(message) {
            errorBox.textContent = message;
            errorBox.classList.add('show');
        }

        function clearError() {
            errorBox.textContent = '';
            errorBox.classList.remove('show');
        }

        function resolveErrorMessage(payload, fallbackMessage) {
            if (!payload) {
                return fallbackMessage;
            }
            if (typeof payload.detail === 'string') {
                return payload.detail;
            }
            if (typeof payload.message === 'string') {
                return payload.message;
            }
            return fallbackMessage;
        }

        function buildPendingVerificationUrl(loginId, email) {
            const params = new URLSearchParams({
                next: nextUrl,
                verification: 'pending',
                login_id: loginId,
                email: email,
            });
            return `/login?${params.toString()}`;
        }

        registerForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            clearError();

            const email = emailInput.value.trim();
            const username = usernameInput.value.trim();
            const gender = genderInput.value;
            const password = document.getElementById('register-password').value;
            const passwordConfirm = document.getElementById('register-password-confirm').value;

            if (!email) {
                showError('请输入邮箱。');
                return;
            }

            if (!username) {
                showError('请输入用户名。');
                return;
            }

            if (password !== passwordConfirm) {
                showError('两次输入的密码不一致。');
                return;
            }

            submitButton.disabled = true;

            const requestBody = {
                email,
                password,
                username,
                gender,
            };

            try {
                const response = await fetch('/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody),
                });

                const payload = await response.json().catch(() => null);
                if (!response.ok) {
                    showError(resolveErrorMessage(payload, '注册失败，请检查输入信息。'));
                    return;
                }

                const registeredLoginId = payload && payload.account && payload.account.login_id
                    ? payload.account.login_id
                    : email;
                const registeredEmail = payload && payload.account && payload.account.email
                    ? payload.account.email
                    : email;
                window.location.href = buildPendingVerificationUrl(registeredLoginId, registeredEmail);
            } catch (error) {
                showError('网络异常，请稍后重试。');
            } finally {
                submitButton.disabled = false;
            }
        });
    </script>
</body>
</html>
